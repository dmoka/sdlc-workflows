name: Validate workflows

on:
  pull_request:
    paths:
      - 'workflows/**'
      - 'scripts/validate-frontmatter.mjs'
      - 'package.json'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci || npm install

      - name: Lint frontmatter
        run: npm run lint
