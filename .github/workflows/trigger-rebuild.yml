name: Trigger site rebuild

# When a workflow MDX change lands on main, POST to the Vercel deploy hook
# so the consuming site (agentic-sdlc.dev) rebuilds and picks up the change.

on:
  push:
    branches: [main]
    paths:
      - 'workflows/**'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: POST to Vercel deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not configured — skipping rebuild trigger."
            echo "To enable: add it under Settings → Secrets and variables → Actions."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK_URL"
          echo ""
          echo "✓ Triggered site rebuild"
